tp_vgg9_dvscifar10_300ep:
  name: tp_vgg9_dvscifar10_300ep
  opt: false
  trainer:
    name: tp
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 1.0e-2
      log: true
    # DVS-CIFAR10-specific values from the reference repo (traces_propagation/experiments/)
    # differ significantly from the global defaults (alpha=0.53, beta=0.98, vth=1.0)
    alpha:
      value: 0.18
      type: float
      min: 0.1
      max: 0.5
    beta:
      value: 0.19
      type: float
      min: 0.1
      max: 0.5
    vth:
      value: 0.5
      type: float
      min: 0.3
      max: 1.0
  model:
    name: vgg9
  dataset:
    name: dvscifar10
    T: 10
  runtime:
    epochs: 300
    batch_size: 16
    seed: 42
    device: cuda
