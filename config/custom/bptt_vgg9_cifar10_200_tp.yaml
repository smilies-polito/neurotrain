bptt_vgg9_cifar10_200_tp:
  name: bptt_vgg9_cifar10_200_tp
  opt: false
  trainer:
    name: bptt
    lr: 0.0001
  model:
    name: vgg9
    default:
      head_type: leaky_integrator
      use_tp_pool: true
      conv_gain: 1.8
      surrogate_kind: atan
      beta: 0.53
  dataset:
    name: cifar10
    batch_size: 64
    T: 10
  runtime:
    epochs: 200
    seed: 42
    device: cuda
