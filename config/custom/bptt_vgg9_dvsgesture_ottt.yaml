bptt_vgg9_dvsgesture_ottt:
  name: bptt_vgg9_dvsgesture_ottt
  opt: false
  trainer:
    name: bptt
    lr: 0.001
  model:
    name: vgg9
    default:
      head_type: global_linear
      scale_after_lif: 2.74
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
  dataset:
    name: dvsgesture
    batch_size: 8
    T: 30
  runtime:
    epochs: 5
    seed: 42
    device: cuda
