bptt_vgg9_cifar10_200_ottt:
  name: bptt_vgg9_cifar10_200_ottt
  opt: false
  trainer:
    name: bptt
    lr: 0.1
  model:
    name: vgg9
    default:
      head_type: global_linear
      scale_after_lif: 2.74
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
  dataset:
    name: cifar10
    T: 6
    direct_coding: true
  runtime:
    epochs: 200
    batch_size: 128
    seed: 42
    device: cuda
