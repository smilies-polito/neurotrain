tp_vgg9_dvsgesture:
  name: tp_vgg9_dvsgesture
  opt: false
  optuna:
    n_trials: 200
  trainer:
    name: tp
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 1.0e-2
      log: true
    # Paper values for DVSGesture (traces_propagation/experiments/dvsgesture.sh); ranges allow Optuna exploration
    alpha:
      value: 0.53
      type: float
      min: 0.1
      max: 0.9
    beta:
      value: 0.98
      type: float
      min: 0.5
      max: 0.999
    vth:
      value: 1.0
      type: float
      min: 0.3
      max: 2.0
  model:
    name: vgg9
  dataset:
    name: dvsgesture
    T: 20
  runtime:
    epochs: 200
    batch_size: 16
    seed: 42
    device: cuda
