tp_vgg9_dvsgesture:
  name: tp_vgg9_dvsgesture
  opt: true
  optuna:
    n_trials: 50
  trainer:
    name: tp
    lr:
      value: 1e-4
      type: float
      min: 1e-5
      max: 1e-2
      log: true
  model:
    name: vgg9
  dataset:
    name: dvsgesture
    T: 100
  runtime:
    epochs: 5
    batch_size: 16
    seed: 42
    device: cuda
