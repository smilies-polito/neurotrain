tp_vgg9_cifar10_200:
  name: tp_vgg9_cifar10_200
  opt: false
  optuna:
    n_trials: 50
  trainer:
    name: tp
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 1.0e-2
      log: true
  model:
    name: vgg9
  dataset:
    name: cifar10
    batch_size: 64
    T: 10
  runtime:
    epochs: 200
    seed: 42
    device: cuda
