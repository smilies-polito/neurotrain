# OTTT trainer + OTTT-style VGG9 + DVSCIFAR10
# Single-run (no Optuna). Paper-grade: 100 epochs.
ottt_otttnet_dvscifar10:
  name: ottt_otttnet_dvscifar10
  opt: false
  trainer:
    name: ottt
    lr: 0.1
    loss_lambda: 0.001
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif:
        value: 2.74
        type: float
        min: 1.5
        max: 3.5
      beta:
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 10
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSCIFAR10
    T: 10
  runtime:
    epochs: 100
    device: cuda
    batch_size: 32
    seed: 42
