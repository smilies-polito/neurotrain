# BPTT trainer + VGG9v2 + CIFAR10 — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
# BPTT has no per-trainer section in vgg9.yaml, so beta/threshold are tunable here.
bptt_vgg9v2_cifar10:
  name: bptt_vgg9v2_cifar10
  opt: true
  optuna:
    n_trials: 50
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: bptt
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 1.0e-1
      log: true
  model:
    name: vgg9
    default:
      head_type: leaky_integrator
      use_tp_pool: true
      li_head_spatial: 2
      li_head_leak: 1.0
      surrogate_kind: atan
      surrogate_scale: 1.0
      conv_gain: 1.8
      scale_after_lif: 0.0
      beta:
        value: 0.53
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 3
      input_shape: [3, 32, 32]
      num_classes: 10
      pool_after_blocks: [2, 4]
  dataset:
    name: CIFAR10
    T: 6
    direct_coding: true
  runtime:
    epochs: 10
    device: cuda
    batch_size: 128
    seed: 42
    neurobench: false
