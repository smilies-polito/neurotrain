# BPTT trainer + OTTT-style VGG9 + DVSCIFAR10 — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
bptt_otttnet_dvscifar10_opt:
  name: bptt_otttnet_dvscifar10_opt
  opt: true
  optuna:
    n_trials: 200
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: bptt
    lr:
      value: 0.001
      type: float
      min: 1.0e-5
      max: 1.0e-1
      log: true
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif: 2.74
      beta:
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 10
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSCIFAR10
    T: 10
  runtime:
    epochs: 10
    device: cuda
    batch_size: 32
    seed: 42
