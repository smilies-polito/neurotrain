# OTTT trainer + OTTT-style VGG9 + SVHN
# Single-run (no Optuna). Paper-grade: 200 epochs.
ottt_otttnet_svhn:
  name: ottt_otttnet_svhn
  opt: false
  trainer:
    name: ottt
    lr: 0.1
    loss_lambda: 0.05
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif:
        value: 2.74
        type: float
        min: 1.5
        max: 3.5
      beta:
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 3
      input_shape: [3, 32, 32]
      num_classes: 10
      pool_after_blocks: [2, 4]
  dataset:
    name: SVHN
    T: 10
    direct_coding: true
  runtime:
    epochs: 200
    device: cuda
    batch_size: 128
    seed: 42
