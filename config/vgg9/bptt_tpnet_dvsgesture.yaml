# BPTT trainer + TP-style VGG9 + DVSGesture
# Single-run (no Optuna). Paper-grade: 100 epochs.
bptt_tpnet_dvsgesture:
  name: bptt_tpnet_dvsgesture
  opt: false
  trainer:
    name: bptt
    lr: 1.0e-4
  model:
    name: vgg9
    default:
      head_type: leaky_integrator
      use_tp_pool: true
      li_head_spatial: 2
      li_head_leak: 1.0
      surrogate_kind: atan
      surrogate_scale: 1.0
      conv_gain: 1.8
      scale_after_lif: 0.0
      beta: 0.53
      threshold: 1.0
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 11
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSGesture
    T: 20
  runtime:
    epochs: 100
    device: cuda
    batch_size: 32
    seed: 42
