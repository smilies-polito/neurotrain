# TP trainer + VGG9v1 + SVHN — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
tp_vgg9v1_svhn:
  name: tp_vgg9v1_svhn
  opt: true
  optuna:
    n_trials: 50
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: tp
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 5.0e-2
      log: true
    alpha:
      value: 0.53
      type: float
      min: 0.05
      max: 0.99
    beta:
      value: 0.98
      type: float
      min: 0.5
      max: 0.99
    vth:
      value: 1.0
      type: float
      min: 0.3
      max: 1.5
  model:
    name: vgg9
    default:
      head_type: leaky_integrator
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif:
        value: 2.74
        type: float
        min: 1.5
        max: 3.5
      beta:
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 3
      input_shape: [3, 32, 32]
      num_classes: 10
      pool_after_blocks: [2, 4]
  dataset:
    name: SVHN
    T: 10
    direct_coding: true
  runtime:
    epochs: 10
    device: cuda
    batch_size: 128
    seed: 42
    neurobench: false
