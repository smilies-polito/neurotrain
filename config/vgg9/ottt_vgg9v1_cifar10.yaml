# OTTT trainer + VGG9v1 + CIFAR10 — Optuna sweep
# ── Optuna budget ───────────────────────────────────────────────────────────
# runtime.epochs : epochs per trial  (100)
# optuna.n_trials: number of trials  (50)
# ── Rationale for search ranges ─────────────────────────────────────────────
# Previous 50-trial / 10-epoch HPO found:
#   lr=2.09e-3, loss_lambda=0.062, scale_after_lif=2.74, β=0.5, θ=1.0
# The subsequent 100-epoch run learned well (≈80% test) until epoch ~20-30
# when the loss exploded and the model collapsed to ~52% — a textbook
# constant-LR instability.  The OTTT paper uses SGD + cosine annealing from
# lr=0.1; without a scheduler a much lower constant LR is required.
#
# Changes vs previous opt config:
#   • LR range tightened: old [1e-4, 5e-1] → new [5e-4, 5e-2], anchored on the
#     previously discovered value (~2e-3).  The upper bound is kept at 5e-2 so
#     Optuna can still try slightly higher (but safer than 5e-1).
#   • loss_lambda range narrowed: old [1e-4, 0.5] → new [1e-3, 0.2]; the
#     paper uses 0.05 and the previous HPO found 0.062, so the narrow range
#     focuses exploration around the meaningful region.
#   • grad_clip and sanitize_grads are now FIXED (not searched) at the values
#     that improved stability in the 100-epoch run.  Both are "general
#     training hygiene" settings; their paper-recommended counterparts are
#     grad_clip=0 / sanitize_grads=false, but the runs showed they help here.
#   • scale_after_lif, β, θ retain the same search ranges (already reasonable
#     and the default is anchored on the previous HPO best).
# ────────────────────────────────────────────────────────────────────────────
ottt_vgg9v1_cifar10:
  name: ottt_vgg9v1_cifar10
  opt: true
  optuna:
    n_trials: 50
    direction: maximize
    sampler: tpe
    pruner: threshold
    timeout: null
    storage: null
  trainer:
    name: ottt
    # ── fixed (paper / stability) ────────────────────────────────────────────
    online_updates: true
    grad_clip: 0.2        # not in OTTT paper; kept fixed — prevents gradient spikes
    sanitize_grads: true  # same; filters NaN/inf gradients
    # ── searched ─────────────────────────────────────────────────────────────
    lr:                              # paper: SGD 0.1 + cosine; without scheduler use constant ≪ 0.1
      value: 2.0e-3
      type: float
      min: 5.0e-4                    # ~¼× previous best — safe lower bound
      max: 5.0e-2                    # 10× previous best — enough room without hitting instability
      log: true
    loss_lambda:                     # CE/(1-λ) + MSE/λ weight; paper CIFAR10 = 0.05
      value: 5.0e-2
      type: float
      min: 1.0e-3
      max: 2.0e-1
      log: true
  model:
    name: vgg9
    default:
      # ── fixed (OTTT architecture) ────────────────────────────────────────
      head_type: global_linear       # no temporal integration — OTTT-arch classifier
      use_tp_pool: false
      surrogate_kind: sigmoid        # paper uses sigmoid surrogate
      surrogate_slope: 4.0           # paper α=4
      conv_gain: 1.0                 # VGG9v1 weight scale
      in_channels: 3
      input_shape: [3, 32, 32]
      num_classes: 10
      pool_after_blocks: [2, 4]      # avg-pool ×2 for 32×32 → 8×8 feature map
      # ── searched ─────────────────────────────────────────────────────────
      scale_after_lif:               # post-LIF output scaling (OTTT-arch param); prev best = 2.74
        value: 2.74
        type: float
        min: 1.5
        max: 3.5
      beta:                          # LIF membrane decay; paper τ=2 → β≈0.5
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:                     # LIF voltage threshold; paper default = 1.0
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
  dataset:
    name: CIFAR10
    T: 6
    direct_coding: true
  runtime:
    epochs: 100
    device: cuda
    batch_size: 128
    seed: 42
    neurobench: false
