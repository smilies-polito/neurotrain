# OTTT trainer + OTTT-style VGG9 + DVSGesture — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
ottt_otttnet_dvsgesture_opt:
  name: ottt_otttnet_dvsgesture_opt
  opt: true
  optuna:
    n_trials: 50
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: ottt
    lr:
      value: 0.1
      type: float
      min: 1.0e-4
      max: 5.0e-1
      log: true
    loss_lambda:
      value: 0.001
      type: float
      min: 1.0e-4
      max: 0.5
      log: true
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif:
        value: 2.74
        type: float
        min: 1.5
        max: 3.5
      beta:
        value: 0.5
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 11
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSGesture
    T: 20
  runtime:
    epochs: 10
    device: cuda
    batch_size: 32
    seed: 42
    neurobench: false
