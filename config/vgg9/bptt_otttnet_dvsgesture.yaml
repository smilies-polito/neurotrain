# BPTT trainer + OTTT-style VGG9 + DVSGesture
# Single-run (no Optuna). Paper-grade: 100 epochs.
bptt_otttnet_dvsgesture:
  name: bptt_otttnet_dvsgesture
  opt: false
  trainer:
    name: bptt
    lr: 0.001
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif: 2.74
      beta: 0.5
      threshold: 1.0
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 11
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSGesture
    T: 20
  runtime:
    epochs: 100
    device: cuda
    batch_size: 32
    seed: 42
