# OTTT trainer + OTTT-style VGG9 + SVHN — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
ottt_otttnet_svhn_opt:
  name: ottt_otttnet_svhn_opt
  opt: true
  optuna:
    n_trials: 200
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: ottt
    lr:
      value: 0.1
      type: float
      min: 1.0e-4
      max: 5.0e-1
      log: true
    loss_lambda:
      value: 0.05
      type: float
      min: 1.0e-4
      max: 0.5
      log: true
  model:
    name: vgg9
    default:
      head_type: global_linear
      use_tp_pool: false
      surrogate_kind: sigmoid
      surrogate_slope: 4.0
      conv_gain: 1.0
      scale_after_lif: 2.74
      beta: 0.5
      threshold: 1.0
      in_channels: 3
      input_shape: [3, 32, 32]
      num_classes: 10
      pool_after_blocks: [2, 4]
  dataset:
    name: SVHN
    T: 10
    direct_coding: true
  runtime:
    epochs: 10
    device: cuda
    batch_size: 128
    seed: 42
