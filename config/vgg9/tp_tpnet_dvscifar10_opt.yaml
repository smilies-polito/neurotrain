# TP trainer + TP-style VGG9 + DVSCIFAR10 — Optuna sweep
# ── Optuna budget — edit these two values to change the sweep cost ──────────
# runtime.epochs : epochs per trial (currently 10)
# optuna.n_trials: total number of trials   (currently 50)
# ────────────────────────────────────────────────────────────────────────────
tp_tpnet_dvscifar10_opt:
  name: tp_tpnet_dvscifar10_opt
  opt: true
  optuna:
    n_trials: 50
    direction: maximize
    sampler: tpe
    pruner: null
    timeout: null
    storage: null
  trainer:
    name: tp
    lr:
      value: 1.0e-4
      type: float
      min: 1.0e-5
      max: 5.0e-2
      log: true
    alpha:
      value: 0.18   # paper DVSCIFAR10 value (Pes et al. 2026)
      type: float
      min: 0.05
      max: 0.99
    beta:
      value: 0.19   # paper DVSCIFAR10 value
      type: float
      min: 0.05
      max: 0.99
    vth:
      value: 0.5    # paper DVSCIFAR10 value
      type: float
      min: 0.3
      max: 1.5
  model:
    name: vgg9
    default:
      head_type: leaky_integrator
      use_tp_pool: true
      li_head_spatial: 2
      li_head_leak: 1.0
      surrogate_kind: atan
      surrogate_scale: 1.0
      conv_gain: 1.8
      scale_after_lif: 0.0
      beta:
        value: 0.53
        type: float
        min: 0.3
        max: 0.99
      threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
      in_channels: 2
      input_shape: [2, 128, 128]
      num_classes: 10
      pool_after_blocks: [2, 4, 6]
  dataset:
    name: DVSCIFAR10
    T: 10
  runtime:
    epochs: 10
    device: cuda
    batch_size: 32
    seed: 42
    neurobench: false
