name: bptt
supported_net_types: [fc, rec, conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
loss_type:
  value: ce_rate
  type: null   # algorithmic choice — keep fixed; options: ce_rate, mse_count, ce_count
grad_clip: null      # null disables gradient clipping
use_optimizer: true
