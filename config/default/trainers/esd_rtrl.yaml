name: esd_rtrl
supported_net_types: [fc, rec, conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
use_optimizer: true
etrace_decay:           # eligibility trace decay
  value: 0.9
  type: float
  min: 0.5
  max: 0.99
gamma:                  # pseudo-derivative dampening
  value: 0.3
  type: float
  min: 0.1
  max: 0.9
lr_layer_norm: [1.0, 1.0, 1.0]
detach_state_each_step: true
debug_unused_learning_signals: false
