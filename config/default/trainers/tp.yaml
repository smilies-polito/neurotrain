name: tp
supported_net_types: [fc, conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
alpha:
  value: 0.98
  type: float
  min: 0.8
  max: 0.99
beta:
  value: 0.98
  type: float
  min: 0.8
  max: 0.99
vth:
  value: 1.0
  type: float
  min: 0.5
  max: 1.5
surrogate_scale:
  value: 1.0
  type: float
  min: 0.1
  max: 2.0
train_target_propagator: true
use_optimizer: true
