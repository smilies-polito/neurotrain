name: osttp
supported_net_types: [fc, rec]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
pseudo:
  value: tanh
  type: categorical
  list: [tanh, fast_sigmoid]           # surrogate: tanh | logistic
output_loss:
  value: mse
  type: categorical
  list: [mse, ce]       # output loss type
feedback_scale:
  value: 1.0
  type: float
  min: 0.1
  max: 2.0
feedback_seed: 42
grad_clip: 0.0
use_optimizer: true
