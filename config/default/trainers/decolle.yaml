name: decolle
supported_net_types: [fc, conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
g_scale:
  value: 0.5
  type: float
  min: 0.1
  max: 2.0
burn_in: 0
surrogate:
  value: sigmoid
  type: categorical
  list: [sigmoid, boxcar]
surrogate_scale:
  value: 5.0
  type: float
  min: 1.0
  max: 20.0
delta:
  value: 0.5
  type: float
  min: 0.1
  max: 1.0
h_with_noise: false
omega_std: 0.5
lambda_u_upper: 0.0
lambda_u_lower: 0.0
lr_scale_per_layer: false
