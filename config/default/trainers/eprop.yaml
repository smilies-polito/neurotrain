name: eprop
supported_net_types: [recurrent]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
gamma: null           # eligibility trace decay (defaults internally)
dt: null
tau_mem: null
tau_out: null
threshold: null
lr_layer_norm: [1.0, 1.0, 1.0]
use_optimizer: true
update_last: false
update_every: 1
seq_batch_size: 1
