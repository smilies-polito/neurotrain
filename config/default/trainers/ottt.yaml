name: ottt
supported_net_types: [conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
trace_decay: null       # null = inferred from network tau
online_updates: true
loss_lambda: null
grad_clip: null
sanitize_grads: null
