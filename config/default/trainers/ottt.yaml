name: ottt
supported_net_types: [conv]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
batch_size:
  value: 256
  type: categorical
  list: [64, 128, 256, 512]
trace_decay:            # synaptic trace decay; null infers from network tau
  value: 0.5
  type: float
  min: 0.1
  max: 0.99
online_updates: true
loss_lambda:            # CE/MSE interpolation weight (0 = pure CE)
  value: 0.0
  type: float
  min: 0.0
  max: 0.5
grad_clip: null
sanitize_grads: null
