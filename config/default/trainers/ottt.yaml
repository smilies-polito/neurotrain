# OTTT trainer config.
# Paper: Xiao et al. 2022 — SGD lr=0.1 for CIFAR/DVS-CIFAR, Adam lr=1e-3 for DVSGesture.
# lr and loss_lambda are tunable; all other hyperparams fixed to paper values.

name: ottt
supported_net_types: [fc, rec, conv, vgg9]
lr:
  value: 0.1
  type: float
  min: 1.0e-4
  max: 5.0e-1
  log: true
online_updates: true
