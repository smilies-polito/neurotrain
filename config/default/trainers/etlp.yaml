name: etlp
supported_net_types: [fc, rec]
lr:
  value: 1.0e-3
  type: float
  min: 1.0e-5
  max: 1.0e-1
  log: true
surrogate_scale:
  value: 0.3
  type: float
  min: 0.1
  max: 1.0
weight_l1: 0.0
weight_l2: 0.0
update_rate_hz: 1000.0
dt_ms: 1.0
feedback_distribution:
  value: normal
  type: categorical
  list: [normal, uniform]
feedback_scale:
  value: 1.0
  type: float
  min: 0.1
  max: 2.0
use_optimizer: false
grad_clip: 0.0
