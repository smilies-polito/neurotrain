# Recurrent SNN (RSNN) with LIF neurons.
# Required for eprop and esd_rtrl trainers.

default:
  name: r_snn
  net_type: rec
  in_shape: [784]
  hidden_sizes:
    value: [256]
    type: null
    list:
      - [100]
      - [200]
      - [300]
      - [400]
      - [500]
      - [600]
      - [700]
      - [800]
      - [900]
      - [1000]
      - [1100]
      - [1200]
      - [1300]
      - [1400]
      - [1500]
      - [1600]
  num_classes: 10
  beta:
    value: 0.9
    type: float
    min: 0.8
    max: 0.99
  threshold:
    value: 1.0
    type: float
    min: 0.5
    max: 1.5
  reset_mechanism: subtract
  out_integrator: false  # set true when pairing with the TP trainer for eval consistency

mnist:
  in_shape: [784]
  num_classes: 10
  hidden_sizes:
    value: [256]

fashionmnist:
  in_shape: [784]
  num_classes: 10
  hidden_sizes:
    value: [256]

cifar10:
  in_shape: [3072]
  num_classes: 10
  hidden_sizes:
    value: [512, 256]

svhn:
  in_shape: [3072]
  num_classes: 10
  hidden_sizes:
    value: [512, 256]

nmnist:
  in_shape: [2312]  # 2 polarities * 34 * 34
  num_classes: 10
  hidden_sizes:
    value: [256]

dvscifar10:
  in_shape: [32768]  # 2 polarities * 128 * 128 (loaders output [T, B, 2, 128, 128]; network flattens)
  num_classes: 10
  hidden_sizes:
    value: [512]

dvsgesture:
  in_shape: [32768]  # 2 polarities * 128 * 128
  num_classes: 11
  hidden_sizes:
    value: [1024]
