# Recurrent SNN (RSNN) with LIF neurons.
# Required for eprop and esd_rtrl trainers.

default:
  name: r_snn
  net_type: recurrent
  in_shape: [784]
  hidden_sizes:
    value: [256]
    type: categorical
    list:
      - [100]
      - [200]
      - [300]
      - [400]
      - [500]
      - [600]
      - [700]
      - [800]
      - [900]
      - [1000]
      - [1100]
      - [1200]
      - [1300]
      - [1400]
      - [1500]
      - [1600]
  num_classes: 10
  beta:
    value: 0.9
    type: float
    min: 0.8
    max: 0.99
  threshold:
    value: 1.0
    type: float
    min: 0.5
    max: 1.5
  reset_mechanism: subtract

mnist:
  in_shape: [784]
  num_classes: 10
  hidden_sizes:
    value: [256]

fashionmnist:
  in_shape: [784]
  num_classes: 10
  hidden_sizes:
    value: [256]

cifar10:
  in_shape: [3072]
  num_classes: 10
  hidden_sizes:
    value: [512]

svhn:
  in_shape: [3072]
  num_classes: 10
  hidden_sizes:
    value: [512]
