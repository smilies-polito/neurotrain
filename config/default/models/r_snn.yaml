# Recurrent SNN (RSNN) with LIF neurons.
# Required for eprop and esd_rtrl trainers.

default:
  name: r_snn
  net_type: recurrent
  in_shape: [784]
  hidden_sizes: [256]
  num_classes: 10
  beta: 0.9
  threshold: 1.0
  reset_mechanism: subtract

mnist:
  in_shape: [784]
  hidden_sizes: [256]
  num_classes: 10

fashionmnist:
  in_shape: [784]
  hidden_sizes: [256]
  num_classes: 10

cifar10:
  in_shape: [3072]
  hidden_sizes: [512]
  num_classes: 10

svhn:
  in_shape: [3072]
  hidden_sizes: [512]
  num_classes: 10
