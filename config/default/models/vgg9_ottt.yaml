# VGG9 model config for the OTTT trainer.
# Generic factory: vgg9_ottt(in_channels, num_classes, input_shape, pool_after_blocks, **kwargs)
# Tunable Optuna parameters are marked with a type other than null.

default:
  name: vgg9_ottt
  net_type: vgg9
  in_channels: 3
  num_classes: 10
  input_shape: [3, 32, 32]
  pool_after_blocks: [2, 4]      # 32x32 inputs: pool after block 2 and 4
  conv_gain:
    value: 1.0
    type: float
    min: 0.5
    max: 3.0
  beta:
    value: 0.5
    type: float
    min: 0.1
    max: 0.99
  threshold:
    value: 1.0
    type: float
    min: 0.5
    max: 2.0
  scale_after_lif:
    value: 2.74
    type: float
    min: 1.0
    max: 5.0
  surrogate_kind:
    value: sigmoid
    type: categorical
    list: [atan, sigmoid]

# 32x32 static datasets: repeat the same frame T times (direct coding)
cifar10_static:
  in_channels: 3
  num_classes: 10
  input_shape: [3, 32, 32]
  pool_after_blocks: [2, 4]

svhn_static:
  in_channels: 3
  num_classes: 10
  input_shape: [3, 32, 32]
  pool_after_blocks: [2, 4]

# DVS event-based datasets — 128x128 spatial, 2 polarity channels
dvscifar10:
  in_channels: 2
  num_classes: 10
  input_shape: [2, 128, 128]
  pool_after_blocks: [2, 4, 6]   # extra pool to handle 128x128

dvsgesture:
  in_channels: 2
  num_classes: 11
  input_shape: [2, 128, 128]
  pool_after_blocks: [2, 4, 6]   # extra pool to handle 128x128
