# Convolutional SNN with LIF neurons.
# Fixed architecture: 12C5-MP2 -> 32C5-MP2 -> FC -> LIF(out)
# Works with spatial (image) datasets.

default:
  name: conv_snn
  net_type: conv
  in_shape: [3, 32, 32]
  num_classes: 10
  beta:
    value: 0.9
    type: float
    min: 0.8
    max: 0.99
  threshold:
    value: 1.0
    type: float
    min: 0.5
    max: 1.5

mnist:
  in_shape: [1, 28, 28]
  num_classes: 10

fashionmnist:
  in_shape: [1, 28, 28]
  num_classes: 10

cifar10:
  in_shape: [3, 32, 32]
  num_classes: 10

svhn:
  in_shape: [3, 32, 32]
  num_classes: 10
