# Convolutional SNN with LIF neurons.
# Fixed architecture: 12C5-MP2 -> 32C5-MP2 -> FC -> LIF(out)
# Works with spatial (image) datasets.

default:
  name: conv_snn
  net_type: conv
  in_shape: [3, 32, 32]
  num_classes: 10
  beta:
    value: 0.9
    type: float
    min: 0.8
    max: 0.99
  threshold:
    value: 1.0
    type: float
    min: 0.5
    max: 1.5

mnist:
  in_shape: [1, 28, 28]
  num_classes: 10

fashionmnist:
  in_shape: [1, 28, 28]
  num_classes: 10

cifar10:
  in_shape: [3, 32, 32]
  num_classes: 10

svhn:
  in_shape: [3, 32, 32]
  num_classes: 10

nmnist:
  in_shape: [2, 34, 34]  # 2 polarities, 34x34
  num_classes: 10

dvsgesture:
  in_shape: [2, 128, 128]  # 2 polarities, 128x128
  num_classes: 11

dvscifar10:
  in_shape: [2, 128, 128]  # 2 polarities, 128x128
  num_classes: 10

# TP trainer section — enforces integrator-style output for eval consistency
tp:
  out_integrator: true
