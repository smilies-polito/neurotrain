# Benchmarking mode configuration.
#
# Lists the trainers, models and datasets to compare.
# Empty list means "all available defaults in config/default/<kind>/".
#
# See config/README.md for full documentation.

trainers:

  

models:
- vgg9


datasets:
- shd
- svhn

# Shared runtime settings (override defaults for all experiments)
runtime:
  epochs: 2
  device: cuda
  seed: 42
  neurobench: false
  batch_size: 16



# Set opt: true to run Optuna optimisation for every generated experiment.
# Each experiment must define tunable attributes (see config/README.md).
opt: true

# Optuna study settings — used when opt: true.
# These are the global defaults; custom experiments.yaml can override per-experiment.
optuna:
  n_trials: 2          # number of trials per experiment
  direction: maximize   # maximize | minimize
  sampler: tpe          # tpe | random | cmaes
  pruner: null          # median | hyperband | null (no pruning)
  timeout: null         # max seconds per study (null = unlimited)
  storage: null         # e.g. sqlite:///experiments/my_campaign/optuna.db
