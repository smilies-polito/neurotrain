# DEFAULT — fill with HPO results before final run
ottt_otttnet_dvsgesture:
  name: ottt_otttnet_dvsgesture
  opt: false
  trainer:
    name: ottt
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    lr: 0.1
    online_updates: true
    loss_lambda: 0.001
    grad_clip: 0.2
    sanitize_grads: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 2
    num_classes: 11
    input_shape:
    - 2
    - 128
    - 128
    head_type: global_linear
    use_tp_pool: false
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta: 0.5
    threshold: 1.0
    conv_gain: 1.0
    scale_after_lif: 2.74
    surrogate_kind: sigmoid
    surrogate_slope: 4.0
    pool_after_blocks:
    - 2
    - 4
    - 6
    algorithm_name: ottt
  dataset:
    name: dvsgesture
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 20
    seed: 42
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
    use_cache: true
  runtime:
    epochs: 100
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 32
    progress: false
  optuna: {}
