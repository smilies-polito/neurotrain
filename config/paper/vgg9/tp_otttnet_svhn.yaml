tp_otttnet_svhn:
  name: tp_otttnet_svhn_opt
  opt: false
  trainer:
    name: tp
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    lr: 4.768785415482607e-05
    alpha: 0.33598770838196546
    beta: 0.7571306514997965
    vth: 0.8183340223705389
    surrogate_scale: 1.0
    train_target_propagator: true
    use_optimizer: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 3
    num_classes: 10
    input_shape:
    - 3
    - 32
    - 32
    head_type: leaky_integrator
    use_tp_pool: true
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta:
        value: 0.53
        type: float
        min: 0.3
        max: 0.99
    threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
    conv_gain: 1.8
    scale_after_lif: 0.0
    surrogate_kind: atan
    surrogate_slope: 4.0
    pool_after_blocks:
    - 2
    - 4
    li_head_spatial: 2
    li_head_leak: 1.0
    surrogate_scale: 1.0
    algorithm_name: tp
  dataset:
    name: svhn
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 10
    seed: 292
    direct_coding: true
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
  runtime:
    epochs: 200
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 128
    progress: false
  optuna: {}
