bptt_tpnet_dvsgesture:
  name: bptt_tpnet_dvsgesture
  opt: false
  trainer:
    name: bptt
    supported_net_types:
    - fc
    - rec
    - conv
    lr: 0.00031489116479568613
    loss_type: ce_rate
    grad_clip: null
    use_optimizer: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 2
    num_classes: 11
    input_shape:
    - 2
    - 128
    - 128
    head_type: leaky_integrator
    use_tp_pool: true
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta: 0.9559928714228421
    threshold: 1.231993941811405
    conv_gain: 1.8
    scale_after_lif: 0.0
    surrogate_kind: atan
    li_head_spatial: 2
    li_head_leak: 1.0
    surrogate_scale: 1.0
    pool_after_blocks:
    - 2
    - 4
    - 6
    algorithm_name: bptt
  dataset:
    name: dvsgesture
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 20
    seed: 599
    pin_memory: false
    num_workers: 4
    data_root: null
    download: true
    use_cache: true
  runtime:
    epochs: 200
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 32
    progress: false
  optuna: {}
