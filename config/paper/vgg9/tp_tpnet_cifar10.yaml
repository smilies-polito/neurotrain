tp_tpnet_cifar10:
  name: tp_tpnet_cifar10_opt
  opt: false
  trainer:
    name: tp
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    # lr: 0.00017648250675988955
    lr: 2.941375112664826e-05  # original / T=6 (direct coding: T per-timestep Adam steps amplify effective lr by T)
    alpha: 0.5791396725266317
    beta: 0.6722544985518655
    vth: 0.36326210131781284
    surrogate_scale: 1.0
    train_target_propagator: true
    use_optimizer: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 3
    num_classes: 10
    input_shape:
    - 3
    - 32
    - 32
    head_type: leaky_integrator
    use_tp_pool: true
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta:
        value: 0.53
        type: float
        min: 0.3
        max: 0.99
    threshold:
        value: 1.0
        type: float
        min: 0.5
        max: 1.5
    conv_gain: 1.8
    scale_after_lif: 0.0
    surrogate_kind: atan
    li_head_spatial: 2
    li_head_leak: 1.0
    surrogate_scale: 1.0
    pool_after_blocks:
    - 2
    - 4
    algorithm_name: tp
  dataset:
    name: cifar10
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 6
    seed: 362
    direct_coding: true
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
  runtime:
    epochs: 200
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 128
    progress: false
  optuna: {}
