# DEFAULT — fill with HPO results before final run
ottt_tpnet_dvscifar10:
  name: ottt_tpnet_dvscifar10
  opt: false
  trainer:
    name: ottt
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    lr: 0.05
    online_updates: true
    loss_lambda: 0.001
    grad_clip: 0.2
    sanitize_grads: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 2
    num_classes: 10
    input_shape:
    - 2
    - 128
    - 128
    head_type: leaky_integrator
    use_tp_pool: true
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta: 0.53
    threshold: 1.0
    conv_gain: 1.8
    scale_after_lif: 0.0
    surrogate_kind: atan
    surrogate_scale: 1.0
    li_head_spatial: 2
    li_head_leak: 1.0
    pool_after_blocks:
    - 2
    - 4
    - 6
    algorithm_name: ottt
  dataset:
    name: dvscifar10
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 10
    seed: 42
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
    use_cache: true
  runtime:
    epochs: 200
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 32
    progress: false
  optuna: {}
