ottt_tpnet_cifar10:
  name: ottt_tpnet_cifar10
  opt: false
  trainer:
    name: ottt
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    lr: 0.003960515045685085
    online_updates: true
    loss_lambda: 0.0011946697137851401
    grad_clip: 0.2
    sanitize_grads: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 3
    num_classes: 10
    input_shape:
    - 3
    - 32
    - 32
    head_type: global_linear
    use_tp_pool: false
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta: 0.5
    threshold: 1.0
    conv_gain: 1.0
    scale_after_lif: 2.74
    surrogate_kind: sigmoid
    li_head_spatial: 2
    li_head_leak: 1.0
    surrogate_scale: 1.0
    pool_after_blocks:
    - 2
    - 4
    surrogate_slope: 4.0
    algorithm_name: ottt
  dataset:
    name: cifar10
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 6
    seed: 612
    direct_coding: true
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
  runtime:
    epochs: 200
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 128
    progress: false
  optuna: {}
