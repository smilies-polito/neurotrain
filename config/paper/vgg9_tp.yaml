tp_otttnet_cifar10:
  name: tp_otttnet_cifar10_opt
  opt: false
  trainer:
    name: tp
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    lr: 0.00014867167179068166
    alpha: 0.4174410757039846
    beta: 0.563950957910326
    vth: 0.4737083077110927
    surrogate_scale: 1.0
    train_target_propagator: true
    use_optimizer: true
  model:
    name: vgg9
    net_type: vgg9
    in_channels: 3
    num_classes: 10
    input_shape:
    - 3
    - 32
    - 32
    head_type: leaky_integrator
    use_tp_pool: true
    channels:
    - 64
    - 128
    - 256
    - 256
    - 512
    - 512
    - 512
    - 512
    beta: 0.53
    threshold: 1.0
    conv_gain: 1.8
    scale_after_lif: 0.0
    surrogate_kind: atan
    surrogate_slope: 4.0
    pool_after_blocks:
    - 2
    - 4
    li_head_spatial: 2
    li_head_leak: 1.0
    surrogate_scale: 1.0
    algorithm_name: tp
  dataset:
    name: cifar10
    supported_net_types:
    - fc
    - rec
    - conv
    - vgg9
    T: 6
    seed: 887
    direct_coding: true
    pin_memory: false
    download: true
    data_root: null
    num_workers: 4
  runtime:
    epochs: 10
    device: cuda
    seed: 42
    log_level: INFO
    neurobench: true
    batch_size: 128
    progress: false
  optuna: {}

