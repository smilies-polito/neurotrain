# CIFAR10 Default Configuration
# STSF training on CIFAR10 (RGB images)

experiment:
  name: "STSF_CIFAR10"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [3072, 500, 10]  # 32x32x3 = 3072 input features
  beta: 0.9375
  threshold: 1.0
  quantization: false

training:
  epochs: 150
  batch_size: 256
  learning_rate: 0.01
  optimizer: null

trainer:
  name: "stsf"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "CIFAR10"
  timesteps: 10
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2

