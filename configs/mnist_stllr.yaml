# MNIST S-TLLR Configuration
# STDP-inspired Temporal Local Learning Rule on MNIST

experiment:
  name: "STLLR_MNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "stllr"
  layer_sizes: [784, 256, 10]  # [input, hidden..., output]
  beta: 0.9  # Not used by STLLR (uses leak parameter)
  threshold: 0.6
  quantization: false

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  optimizer: "adam"

trainer:
  name: "stllr"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 25
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2
