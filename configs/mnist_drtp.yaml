# MNIST DRTP Configuration
# Direct Random Target Projection (DRTP) training on MNIST

experiment:
    name: "DRTP_MNIST"
    seed: 42
    deterministic: true
    log_dir: "./experiments"

model:
    architecture: "fc"
    layer_sizes: [784, 500, 500, 10] # [input, hidden..., output]
    beta: 0.9375
    threshold: 1.0
    quantization: false

training:
    # Paper-aligned MNIST DRTP schedule.
    epochs: 100
    batch_size: 60
    learning_rate: 1.5e-4 # FC2 reference baseline from paper table
    optimizer: "adam"
    weight_decay: 0.0
    freeze_conv: false

trainer:
    name: "drtp"
    update_last: false # false = per-timestep updates
    update_every: 1 # update every timestep
    seq_batch: 1

drtp:
    loss: "bce"
    output_mode: "mem" # paper-aligned reference ("spike" kept for compatibility experiments)
    surrogate_scale: 5.0
    surrogate_type: "logistic"
    feedback_distribution: "kaiming_uniform"
    feedback_scale: 1.0
    fixed_feedback: true

data:
    dataset: "MNIST"
    timesteps: 10
    data_dir: "./src/Data"
    num_workers: 4

hardware:
    device: "auto"
    mixed_precision: false

checkpoint:
    save_every: 0
    save_best: true
    save_latest: true
    max_keep: 2
