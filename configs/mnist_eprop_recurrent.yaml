# MNIST E-prop (Recurrent SRNN) Configuration
# Mirrors the reference e-prop defaults for fair comparison.

experiment:
  name: "EPROP_SRNN_MNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "recurrent"      # Use SRNN with explicit recurrence
  layer_sizes: [784, 100, 10]    # n_in, n_rec, n_out (n_rec=100 as in reference)
  beta: 0.9995                   # Not used by SRNN but kept for compatibility
  threshold: 0.6                 # Reference threshold
  quantization: false

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.0001          # Reference lr=1e-4
  optimizer: "adam"              # Adam matches reference script

trainer:
  name: "eprop"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 10                  # Rate-coded timesteps for MNIST
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2


