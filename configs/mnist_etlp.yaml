# MNIST ETLP Configuration
# Event-based Three-factor Local Plasticity (ETLP) training on MNIST

experiment:
    name: "ETLP_MNIST"
    seed: 42
    deterministic: true
    log_dir: "./experiments"

model:
    architecture: "fc"
    layer_sizes: [784, 200, 10] # [input, hidden, output]
    beta: 0.9375
    threshold: 1.0
    quantization: false

training:
    epochs: 30
    batch_size: 256
    learning_rate: 0.0005
    optimizer: "adam" # Use optimizer-driven ETLP updates
    weight_decay: 0.0
    freeze_conv: false

trainer:
    name: "etlp"
    update_last: false
    update_every: 1
    seq_batch: 1

etlp:
    trace_decay: 0.9375
    surrogate_scale: 0.3
    voltage_reg: 0.0
    weight_l1: 0.0
    weight_l2: 0.0
    update_rate_hz: 100.0
    dt_ms: 1.0
    feedback_distribution: "kaiming_uniform"
    feedback_scale: 1.0

data:
    dataset: "MNIST"
    timesteps: 10
    data_dir: "./src/Data"
    num_workers: 4

hardware:
    device: "auto"
    mixed_precision: false

checkpoint:
    save_every: 0
    save_best: true
    save_latest: true
    max_keep: 2
