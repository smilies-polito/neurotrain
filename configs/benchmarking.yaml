experiment:
  name: full_benchmark
  output_dir: ./benchmark_results
  seed: 42
  deterministic: true

execution:
  epochs: 1
  batch_size: 128
  learning_rate: 0.001
  timesteps: 25
  show_epoch_progress: true
  max_train_batches: null
  max_test_batches: null
  device: cuda
  single_process_data_loading: false
  continue_on_error: true
  run_neurobench: false

data:
  datasets:
    - MNIST
    - FashionMNIST
    - CIFAR10
    - SVHN
    - NMNIST
    - DVSGesture
  dataset_defaults:
    MNIST:
      input_shape: [1, 28, 28]
      input_size: 784
      num_classes: 10
      timesteps: 25
    FashionMNIST:
      input_shape: [1, 28, 28]
      input_size: 784
      num_classes: 10
      timesteps: 25
    CIFAR10:
      input_shape: [3, 32, 32]
      input_size: 3072
      num_classes: 10
      timesteps: 25
    SVHN:
      input_shape: [3, 32, 32]
      input_size: 3072
      num_classes: 10
      timesteps: 25
    NMNIST:
      input_shape: [1, 34, 34]
      input_size: 1156
      num_classes: 10
      timesteps: 25
    DVSGesture:
      input_shape: [1, 128, 128]
      input_size: 16384
      num_classes: 11
      timesteps: 50

trainers:
  bptt:
    module: trainers.bptt_trainer
    class_name: BPTTTrainer
    enabled: true
    requires_all_tags: []
    excludes_any_tags: []
    requires_network_attrs: [reset]
    allowed_architectures: []
    training:
      requires_grad: true
      use_optimizer: true
      optimizer: adam
    params:
      loss_type: ce_rate

  drtp:
    module: trainers.drtp_trainer
    class_name: DRTPTrainer
    enabled: true
    requires_all_tags: []
    excludes_any_tags: [recurrent]
    requires_network_attrs: [n_classes]
    allowed_architectures: []
    training:
      requires_grad: false
      use_optimizer: false
      optimizer: null
    params:
      loss_type: mse
      output_mode: mem
      surrogate_scale: 5.0
      surrogate_type: logistic
      feedback_distribution: kaiming_uniform
      feedback_scale: 1.0
      fixed_feedback: true
      freeze_conv: false
      update_last: false
      update_every: 1

  ostl:
    module: trainers.ostl_trainer
    class_name: OSTLTrainer
    enabled: true
    requires_all_tags: [fully_connected]
    excludes_any_tags: [recurrent, convolutional]
    requires_network_attrs: [synapses, neurons]
    allowed_architectures: [fc_snn]
    training:
      requires_grad: false
      use_optimizer: false
      optimizer: null
    params:
      surrogate_scale: 5.0
      grad_clip: 0.0
      output_mode: spike
      update_last: false
      update_every: 1

  ottt:
    module: trainers.ottt_trainer
    class_name: OTTTTrainer
    enabled: true
    requires_all_tags: []
    excludes_any_tags: []
    requires_network_attrs: [reset]
    allowed_architectures: []
    training:
      requires_grad: false
      use_optimizer: true
      optimizer: sgd
    params:
      trace_decay: 0.9
      online_updates: false
      loss_lambda: 0.0
