# MNIST STOP Configuration
# STOP-WTL (weights + thresholds + leakage) on FC snnTorch network

experiment:
  name: "STOP_MNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [784, 256, 10]
  beta: 0.9375
  threshold: 1.0
  quantization: false

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  optimizer: null

trainer:
  name: "stop"
  update_last: false
  update_every: 1
  seq_batch: 1

stop:
  loss: "ce"
  surrogate: "exp"
  learn_weights: true
  learn_thresholds: true
  learn_leakage: true
  lr_weight: null
  lr_threshold: null
  lr_leakage: null
  threshold_min: 0.001
  momentum: 0.0
  cosine_schedule: false
  cosine_t_max: 0
  static_input_timesteps: 1

data:
  dataset: "MNIST"
  timesteps: 10
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2
