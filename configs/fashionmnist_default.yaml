# FashionMNIST Default Configuration
# STSF training on FashionMNIST (more challenging than MNIST)

experiment:
  name: "STSF_FashionMNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [784, 500, 10]  # Larger hidden layer for FashionMNIST
  beta: 0.9375
  threshold: 1.0
  quantization: false

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.01
  optimizer: null

trainer:
  name: "stsf"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "FashionMNIST"
  timesteps: 10
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2

