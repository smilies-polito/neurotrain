# MNIST Default Configuration
# Spiking Time Sparse Feedback (STSF) training on MNIST

experiment:
  name: "STSF_MNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [784, 200, 10]  # [input, hidden..., output]
  beta: 0.9375
  threshold: 1.0
  quantization: false

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.01
  optimizer: null  # null for manual STSF updates, "adam" for optimizer-based

trainer:
  name: "stsf"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 10
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"  # "auto", "cuda", "cuda:0", "cpu", "mps"
  mixed_precision: false

checkpoint:
  save_every: 0  # 0 = only best and latest
  save_best: true
  save_latest: true
  max_keep: 2

