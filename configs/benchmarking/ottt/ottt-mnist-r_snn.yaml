# OTTT benchmark config: MNIST on r_snn

experiment:
  name: "OTTT_MNIST_r_snn"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "r_snn"
  layer_sizes: [784, 192, 10]
  recurrent_type: "standard"
  beta: 0.9
  threshold: 1.0
  quantization: false

training:
  epochs: 50
  batch_size: 128
  learning_rate: 0.001
  optimizer: null

trainer:
  name: "ottt"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 25
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2
