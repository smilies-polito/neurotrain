# MNIST Quantized Configuration
# Quantized STSF training for hardware deployment

experiment:
  name: "STSF_MNIST_Quantized"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [784, 200, 10]
  beta: 0.9375
  threshold: 1.0
  quantization: true

training:
  epochs: 100
  batch_size: 1  # Quantized training requires batch_size=1
  learning_rate: 0.1
  optimizer: null

trainer:
  name: "stsf"
  update_last: false
  update_every: 5  # Less frequent updates for quantized
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 10
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "cpu"  # Quantized training on CPU
  mixed_precision: false

checkpoint:
  save_every: 10
  save_best: true
  save_latest: true
  max_keep: 5

