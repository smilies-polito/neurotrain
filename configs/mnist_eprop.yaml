# MNIST E-prop Configuration
# Eligibility Propagation (e-prop) training on MNIST
# Based on: Bellec et al., "A solution to the learning dilemma for
# recurrent networks of spiking neurons," Nature Communications, 2020

experiment:
  name: "EPROP_MNIST"
  seed: 42
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "fc"
  layer_sizes: [784, 200, 10]  # [input, hidden..., output]
  beta: 0.9375  # Membrane decay (alpha in e-prop terminology)
  threshold: 1.0
  quantization: false

training:
  epochs: 100
  batch_size: 256
  learning_rate: 0.001  # E-prop typically uses smaller learning rates
  optimizer: null  # null for manual e-prop updates, "adam" for optimizer-based

trainer:
  name: "eprop"
  update_last: false
  update_every: 1  # Update weights every timestep
  seq_batch: 1

data:
  dataset: "MNIST"
  timesteps: 10  # Number of timesteps for rate-coded input
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"  # "auto", "cuda", "cuda:0", "cpu", "mps"
  mixed_precision: false

checkpoint:
  save_every: 0  # 0 = only best and latest
  save_best: true
  save_latest: true
  max_keep: 2

