# MNIST OSTL Configuration
# Online Spatio-Temporal Learning (Bohnstingl et al., 2020) on FC snnTorch network

experiment:
    name: "OSTL_MNIST"
    seed: 42
    deterministic: true
    log_dir: "./experiments"

model:
    architecture: "recurrent"
    recurrent_type: "snu" # Paper-aligned SNU recurrence
    layer_sizes: [784, 256, 256, 10] # Paper-style OSTL MLP: two hidden layers of 256
    beta: 0.9375
    threshold: 1.0
    quantization: false

training:
    epochs: 50
    batch_size: 128
    learning_rate: 0.001
    optimizer: null # null = manual OSTL update; can be "adam"/"sgd"/"nag"/"rmsprop"

trainer:
    name: "ostl"
    update_last: false
    update_every: 1
    seq_batch: 1

ostl:
    surrogate_scale: 5.0
    grad_clip: 0.0

data:
    dataset: "MNIST"
    timesteps: 25
    data_dir: "./src/Data"
    num_workers: 4

hardware:
    device: "auto"
    mixed_precision: false

checkpoint:
    save_every: 0
    save_best: true
    save_latest: true
    max_keep: 2
