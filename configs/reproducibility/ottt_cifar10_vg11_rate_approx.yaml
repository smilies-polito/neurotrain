# OTTT + VG11SNN on CIFAR-10 with the current rate-coded CIFAR10 loader.
#
# IMPORTANT:
# - This is an approximation setup for the current framework state.
# - It is not the official OTTT paper recipe (which uses static repeated input,
#   augmentation/normalization, and the dedicated ottt_repro VGG(sWS) network).
#
# Notes from in-container quick sweeps (limited batches):
# - T=25 outperformed T=6/T=10 early on this loader/network combination.
# - beta=0.9 outperformed beta=0.5 for VG11SNN.
# - lr=0.1 with SGD(momentum=0.9) gave the strongest early test trend.
# - Follow-up sweeps favored T=30 over T=25 for better early validation trend.

experiment:
  name: "OTTT_CIFAR10_VG11_RATE_APPROX"
  seed: 2022
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "vg11_snn"
  layer_sizes: [3072, 512, 10]
  beta: 0.9
  tau: null
  threshold: 1.0
  recurrent_type: "standard"
  quantization: false

training:
  epochs: 300
  batch_size: 128
  learning_rate: 0.1
  optimizer: "sgd"
  weight_decay: 0.0
  freeze_conv: false

trainer:
  name: "ottt"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "CIFAR10"
  timesteps: 30
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2
