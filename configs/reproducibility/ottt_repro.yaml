# OTTT reproducibility config for CIFAR-10 VGG(sWS) with T=6.
# Official OTTT-SNN recipe alignment:
# - Optimizer: SGD(momentum=0.9), lr=0.1, weight_decay=0.0
# - Schedule: cosine annealing over 300 epochs
# - Loss: (1-lambda)*CE + lambda*MSE, lambda=0.05
# - Input: static image repeated across timesteps (handled by main.py/get_loader)
# - CIFAR10 train augmentation: random crop + horizontal flip + cutout
# - CIFAR10 normalization: mean/std from official repo
# Paper targets (Table 1, T=6):
# - OTTT_A: 93.52±0.06 (max 93.58)
# - OTTT_O: 93.49±0.17 (max 93.73)

experiment:
  name: "ottt_repro"
  seed: 2022
  deterministic: true
  log_dir: "./experiments"

model:
  architecture: "ottt_repro"
  layer_sizes: [3072, 10]
  beta: 0.5
  tau: 2.0
  threshold: 1.0
  quantization: false

training:
  epochs: 300
  batch_size: 128
  learning_rate: 0.1
  optimizer: "sgd"
  weight_decay: 0.0
  freeze_conv: false

trainer:
  name: "ottt"
  update_last: false
  update_every: 1
  seq_batch: 1

data:
  dataset: "CIFAR10"
  timesteps: 6
  data_dir: "./src/Data"
  num_workers: 4

hardware:
  device: "auto"
  mixed_precision: false

checkpoint:
  save_every: 0
  save_best: true
  save_latest: true
  max_keep: 2
