# MNIST DRTP Convolutional Configuration
# Spiking conversion of paper CONV topology:
# Conv(32, 5x5, stride=1, padding=2) -> MaxPool(2x2, stride=2) -> FC(1000) -> FC(10)

experiment:
    name: "DRTP_MNIST_CONV32_FC1000"
    seed: 42
    deterministic: true
    log_dir: "./experiments"

model:
    architecture: "conv"
    conv_layers:
        - out_channels: 32
          kernel_size: 5
          stride: 1
          padding: 2
          pool_kernel: 2
          pool_stride: 2
    layer_sizes: [1000, 10] # FC(1000) -> FC(10)
    beta: 0.9375
    threshold: 1.0
    quantization: false

training:
    epochs: 100
    batch_size: 60
    learning_rate: 0.005
    optimizer: "adam"
    weight_decay: 0.0
    # CONV(trained) when false; CONV(random) when true.
    freeze_conv: false

trainer:
    name: "drtp"
    update_last: false
    update_every: 1
    seq_batch: 1

drtp:
    loss: "bce"
    output_mode: "mem" # paper-aligned reference ("spike" for compatibility experiments)
    paper_reproduction: true
    surrogate_scale: 5.0
    surrogate_type: "logistic"
    feedback_distribution: "kaiming_uniform"
    feedback_scale: 1.0
    fixed_feedback: true

data:
    dataset: "MNIST"
    timesteps: 10
    data_dir: "./src/Data"
    num_workers: 4

hardware:
    device: "auto"
    mixed_precision: false

checkpoint:
    save_every: 0
    save_best: true
    save_latest: true
    max_keep: 2
